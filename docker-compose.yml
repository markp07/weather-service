services:
  weather-redis:
    image: redis:latest
    container_name: weather-redis
    restart: always
    ports:
      - '13004:6379'
    command: [ "redis-server", "--bind", "0.0.0.0" ]
    hostname: weather-redis
    volumes:
      - cache:/data
    networks:
      default-network:
        aliases:
          - weather-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  weather-postgres:
    image: postgres:latest
    container_name: weather-postgres
    restart: always
    environment:
      POSTGRES_DB: weather_service
      POSTGRES_USER: weather_service
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '13003:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      default-network:
        aliases:
          - weather-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_service -d weather_service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  weather-service:
    image: weather-service:latest
    container_name: weather-service
    restart: unless-stopped
    build:
      context: ./weather-service
      dockerfile: Dockerfile
    depends_on:
      weather-redis:
        condition: service_healthy
      weather-postgres:
        condition: service_healthy
    ports:
      - '13001:13001'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      JWT_PUBLIC_KEY_URL: ${JWT_PUBLIC_KEY_URL:-https://auth.markpost.dev/api/auth/v1/public-key}
      ALLOWED_ORIGIN_PATTERNS: ${ALLOWED_ORIGIN_PATTERNS:-https://weather.markpost.dev}
      REVERSE_GEOCODE_API_KEY: ${REVERSE_GEOCODE_API_KEY}
    volumes:
      - weather_service_data:/data
    networks:
      default-network:
        aliases:
          - weather-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13001/api/weather/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  weather-frontend:
    image: weather-frontend:latest
    container_name: weather-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AUTH_API_URL: ${NEXT_PUBLIC_AUTH_API_URL:-https://auth.markpost.dev}
        NEXT_PUBLIC_WEATHER_API_URL: ${NEXT_PUBLIC_WEATHER_API_URL:-https://weather.markpost.dev}
    restart: unless-stopped
    ports:
      - "13002:3030"
    depends_on:
      weather-service:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_AUTH_API_URL: ${NEXT_PUBLIC_AUTH_API_URL:-https://auth.markpost.dev}
      NEXT_PUBLIC_WEATHER_API_URL: ${NEXT_PUBLIC_WEATHER_API_URL:-https://weather.markpost.dev}
    networks:
      default-network:
        aliases:
          - weather-frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3030"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cache:
    driver: local
  postgres_data:
    driver: local
  weather_service_data:
    driver: local

networks:
  default-network:
    external: true

