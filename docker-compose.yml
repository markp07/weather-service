services:
  weather-redis:
    image: redis:latest
    restart: always
    ports:
      - '13004:6379'
    command: [ "redis-server", "--bind", "0.0.0.0" ]
    hostname: cache
    volumes:
      - cache:/data
    networks:
      - default-network

  weather-postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: weather_service
      POSTGRES_USER: weather_service
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '13003:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - default-network

  weather-service:
    image: weather-service:latest
    restart: always
    build:
      context: ./weather-service
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    ports:
      - '13001:13001'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - weather_service_data:/data
    networks:
      - default-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "13002:3030"
    depends_on:
      - weather-service
    environment:
      NEXT_PUBLIC_WEATHER_API_URL: http://localhost:12001
    networks:
      - default-network

volumes:
  cache:
    driver: local
  postgres_data:
    driver: local
  weather_service_data:
    driver: local

networks:
  default-network:
    external: true