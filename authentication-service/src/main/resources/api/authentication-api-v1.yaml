openapi: 3.0.3
info:
  title: Auth API
  version: 1.0.0
  description: JWT-based Authentication API for Spring Boot backend.

tags:
  - name: login
    description: Endpoints for user login
  - name: manage-password
    description: Endpoints for password change and reset
  - name: manage-2fa
    description: Endpoints for managing two-factor authentication (2FA)
  - name: passkey
    description: Endpoints for passkey/WebAuthn management
  - name: public-key
    description: Endpoint for retrieving public key
  - name: user
    description: Endpoints for user profile management

servers:
  - url: https://your-backend.com

paths:
  /login:
    post:
      operationId: login
      summary: Login and receive access/refresh tokens
      tags:
        - login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful, tokens set in HttpOnly cookies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '202':
          description: Login accepted, further action required (e.g. 2FA)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]

  /refresh:
    post:
      operationId: refresh
      summary: Refresh access token using refresh token cookie
      tags:
        - login
      x-spring-method-parameter:
        - type: jakarta.servlet.http.HttpServletRequest
          name: request
        - type: jakarta.servlet.http.HttpServletResponse
          name: response
      responses:
        '200':
          description: Access token refreshed and set in HttpOnly cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - RefreshCookie: [ ]
  /logout:
    post:
      operationId: logout
      summary: Clear access and refresh tokens
      tags:
        - login
      responses:
        '200':
          description: Tokens cleared (cookies deleted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
      security:
        - AccessCookie: [ ]
  /register:
    post:
      operationId: register
      summary: Register a new user
      tags:
        - login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid registration data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /password/change:
    put:
      operationId: changePassword
      summary: Change password for authenticated user
      tags:
        - manage-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Old password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /password/forgot:
    post:
      operationId: forgotPassword
      summary: Initiate password reset (sends email)
      tags:
        - manage-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '200':
          description: Password reset email sent (or silently ignored)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
      security:
        - AccessCookie: [ ]
  /password/reset:
    post:
      operationId: resetPassword
      summary: Reset password using reset token
      tags:
        - manage-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /2fa/setup:
    post:
      operationId: setup2FA
      summary: Start 2FA setup (generates secret and QR code URL)
      tags:
        - manage-2fa
      responses:
        '200':
          description: TOTP secret and QR code returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPSetupResponse'
      security:
        - AccessCookie: [ ]
  /2fa/confirm:
    post:
      operationId: enable2FA
      summary: Enable 2FA for user
      tags:
        - manage-2fa
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPCode'
        required: true
      responses:
        '200':
          description: 2FA enabled for user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
      security:
        - AccessCookie: [ ]
  /2fa/verify:
    post:
      operationId: verify2FA
      summary: Complete login using TOTP code after password check
      tags:
        - manage-2fa
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPVerifyRequest'
        required: true
      responses:
        '200':
          description: Login successful (tokens set)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Invalid or missing code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /public-key:
    get:
      operationId: getPublicKey
      summary: Get public key for JWT verification
      tags:
        - public-key
      responses:
        '200':
          description: Public key PEM string
          content:
            text/plain:
              schema:
                type: string
  /user:
    get:
      operationId: getUserDetails
      summary: Get user profile information
      tags:
        - user
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
    put:
      operationId: updateUserName
      summary: Update user name
      tags:
        - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserNameRequest'
        required: true
      responses:
        '200':
          description: Username updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
    delete:
      operationId: deleteAccount
      summary: Delete user account (requires password)
      tags:
        - user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRequest'
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Not authenticated or password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /2fa/disable:
    post:
      operationId: disable2FA
      summary: Disable 2FA for user (requires password)
      tags:
        - manage-2fa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRequest'
      responses:
        '200':
          description: 2FA disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Not authenticated or password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /2fa/backup-code:
    post:
      operationId: generateBackupCode
      summary: Generate a new 2FA backup code for the current user
      tags:
        - manage-2fa
      responses:
        '200':
          description: Backup code generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupCodeResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /2fa/reset:
    post:
      operationId: reset2FA
      summary: Reset (disable) 2FA using backup code
      tags:
        - manage-2fa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupCodeResponse'
      responses:
        '200':
          description: 2FA disabled using backup code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: Invalid backup code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /passkey:
    get:
      operationId: listPasskeys
      summary: List all registered passkeys for the current user
      tags:
        - passkey
      responses:
        '200':
          description: List of registered passkeys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PasskeyInfoDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /passkey/{credentialId}:
    delete:
      operationId: deletePasskey
      summary: Delete a registered passkey
      tags:
        - passkey
      parameters:
        - name: credentialId
          in: path
          required: true
          description: The credential ID of the passkey to delete
          schema:
            type: string
      responses:
        '204':
          description: Passkey deleted successfully
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Passkey not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /passkey/register/start:
    post:
      operationId: startPasskeyRegistration
      summary: Start passkey registration process
      tags:
        - passkey
      responses:
        '200':
          description: Registration options for WebAuthn ceremony
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyCredentialCreationOptionsDto'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /passkey/register/finish:
    post:
      operationId: finishPasskeyRegistration
      summary: Complete passkey registration process
      tags:
        - passkey
      parameters:
        - name: name
          in: query
          required: true
          description: Name for the passkey
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: PublicKeyCredential from WebAuthn ceremony
      responses:
        '200':
          description: Passkey registered successfully
        '400':
          description: Invalid credential data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /passkey/login/start:
    post:
      operationId: startPasskeyLogin
      summary: Start passkey authentication process
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyLoginStartRequest'
      responses:
        '200':
          description: Authentication options for WebAuthn ceremony
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyCredentialRequestOptionsDto'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /passkey/login/finish:
    post:
      operationId: finishPasskeyLogin
      summary: Complete passkey authentication process
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyLoginFinishRequest'
      responses:
        '200':
          description: Authentication successful, tokens set in cookies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /passkey/login/usernameless/start:
    post:
      operationId: startUsernamelessPasskeyLogin
      summary: Start usernameless passkey authentication process
      tags:
        - passkey
      responses:
        '200':
          description: Authentication options for WebAuthn ceremony
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyCredentialRequestOptionsDto'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]
  /passkey/login/usernameless/finish:
    post:
      operationId: finishUsernamelessPasskeyLogin
      summary: Complete usernameless passkey authentication process
      tags:
        - passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicKeyCredentialAssertionDto'
      responses:
        '200':
          description: Authentication successful, tokens set in cookies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - AccessCookie: [ ]

components:
  securitySchemes:
    AccessCookie:
      type: apiKey
      in: cookie
      name: access
    RefreshCookie:
      type: apiKey
      in: cookie
      name: refresh
  schemas:
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required:
        - email
        - password
    ChangePasswordRequest:
      type: object
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
      required: [ oldPassword, newPassword ]
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [ email ]
    ResetPasswordRequest:
      type: object
      properties:
        resetToken:
          type: string
        newPassword:
          type: string
      required: [ resetToken, newPassword ]
    TOTPSetupResponse:
      type: object
      properties:
        otpUri:
          type: string
          description: otpauth:// URI for TOTP app
        secret:
          type: string
          description: Base32 TOTP secret
        qrCodeImage:
          type: string
          description: Image data URL for QR code
    TOTPCode:
      type: object
      properties:
        code:
          type: string
          pattern: '^\d{6}$'
      required: [ code ]
    TOTPVerifyRequest:
      type: object
      properties:
        code:
          type: string
      required: [ email, code ]
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        userName:
          type: string
      required:
        - email
        - password
        - userName
    UserDetails:
      type: object
      properties:
        email:
          type: string
        userName:
          type: string
        twoFactorEnabled:
          type: boolean
        passkeyEnabled:
          type: boolean
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
    UpdateUserNameRequest:
      type: object
      properties:
        username:
          type: string
      required:
        - username
    Message:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        code:
          type: string
        description:
          type: string
    Error:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        code:
          type: string
        traceparent:
          type: string
        description:
          type: string
    PasswordRequest:
      type: object
      properties:
        password:
          type: string
          format: password
      required:
        - password
    BackupCodeResponse:
      type: object
      properties:
        backupCode:
          type: string
    PublicKeyCredentialRequestOptionsDto:
      type: object
      properties:
        challenge:
          type: string
          description: Base64URL encoded challenge
        timeout:
          type: integer
          format: int64
          description: Timeout in milliseconds
        rpId:
          type: string
          description: Relying Party identifier
        allowCredentials:
          type: array
          items:
            type: object
          description: List of allowed credentials
        userVerification:
          type: string
          description: User verification requirement
          enum:
            - required
            - preferred
            - discouraged
        extensions:
          type: object
          additionalProperties: true
          description: WebAuthn extensions
        hints:
          type: array
          items:
            type: string
          description: Hints for credential selection
    PasskeyInfoDto:
      type: object
      properties:
        credentialId:
          type: string
          description: The credential ID
        name:
          type: string
          description: The user-provided name for this passkey
        createdAt:
          type: string
          format: date-time
          description: When the passkey was registered
    PasskeyLoginStartRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email address
      required:
        - email
    PasskeyLoginFinishRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email address
        credential:
          $ref: '#/components/schemas/PublicKeyCredentialAssertionDto'
      required:
        - email
        - credential
    PublicKeyCredentialCreationOptionsDto:
      type: object
      description: Options for WebAuthn registration ceremony
      properties:
        rp:
          type: object
          description: Relying Party information
          properties:
            name:
              type: string
            id:
              type: string
        user:
          type: object
          description: User information
          properties:
            id:
              type: string
            name:
              type: string
            displayName:
              type: string
        challenge:
          type: string
          description: Base64URL encoded challenge
        pubKeyCredParams:
          type: array
          description: Supported public key algorithms
          items:
            type: object
            properties:
              type:
                type: string
              alg:
                type: integer
        timeout:
          type: integer
          format: int64
          description: Timeout in milliseconds
        excludeCredentials:
          type: array
          description: Credentials to exclude from registration
          items:
            type: object
        authenticatorSelection:
          type: object
          description: Authenticator selection criteria
          properties:
            authenticatorAttachment:
              type: string
            requireResidentKey:
              type: boolean
            residentKey:
              type: string
            userVerification:
              type: string
        attestation:
          type: string
          description: Attestation conveyance preference
        extensions:
          type: object
          additionalProperties: true
          description: WebAuthn extensions
    PublicKeyCredentialAttestationDto:
      type: object
      description: PublicKeyCredential with attestation response from WebAuthn registration
      properties:
        id:
          type: string
          description: Base64URL encoded credential ID
        rawId:
          type: string
          description: Base64URL encoded raw credential ID
        type:
          type: string
          description: Credential type (public-key)
        response:
          type: object
          description: Authenticator attestation response
          properties:
            clientDataJSON:
              type: string
              description: Base64URL encoded client data JSON
            attestationObject:
              type: string
              description: Base64URL encoded attestation object
            transports:
              type: array
              items:
                type: string
              description: Supported transports
        clientExtensionResults:
          type: object
          additionalProperties: true
          description: Client extension results
    PublicKeyCredentialAssertionDto:
      type: object
      description: PublicKeyCredential with assertion response from WebAuthn authentication
      properties:
        id:
          type: string
          description: Base64URL encoded credential ID
        rawId:
          type: string
          description: Base64URL encoded raw credential ID
        type:
          type: string
          description: Credential type (public-key)
        response:
          type: object
          description: Authenticator assertion response
          properties:
            clientDataJSON:
              type: string
              description: Base64URL encoded client data JSON
            authenticatorData:
              type: string
              description: Base64URL encoded authenticator data
            signature:
              type: string
              description: Base64URL encoded signature
            userHandle:
              type: string
              description: Base64URL encoded user handle
        clientExtensionResults:
          type: object
          additionalProperties: true
          description: Client extension results
