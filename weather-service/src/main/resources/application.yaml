# Set the base path for the API
server:
  port: 13001
  servlet:
    context-path: /api/weather

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      probes:
        enabled: true

spring:
  cache:
    type: redis
  data:
    redis:
      host: weather-redis
      port: 6379
  datasource:
    url: jdbc:postgresql://weather-postgres:5432/weather_service?useUnicode=true&characterEncoding=UTF-8
    username: weather_service
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        connection:
          useUnicode: true
          characterEncoding: UTF-8
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

security:
  excluded-paths: /actuator/health,/actuator/info,/actuator/prometheus,/api/weather/actuator/health,/api/weather/actuator/info,/api/weather/actuator/prometheus,/swagger-ui.html,/swagger-ui/**,/*/api-docs

weather:
  cors:
    # Configure allowed origins for your frontend application
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:https://weather.yourdomain.tld}

logging:
  level:
    root: INFO
    nl.markpost.weather: INFO

jwt:
  # Configure the URL to your external authentication service's public key endpoint
  # This service works with https://github.com/markp07/authentication-service
  public-key-url: ${JWT_PUBLIC_KEY_URL:https://yourdomain.tld/api/auth/v1/public-key}

reverse-geocode:
  # Configure the API key for reverse geocoding service (https://api-bdc.io)
  api-key: ${REVERSE_GEOCODE_API_KEY}
  url: https://api-bdc.io
  # BCP-47 language code for location names, e.g. 'en' or 'nl' (default: en)
  language: ${REVERSE_GEOCODE_LANGUAGE:en}

open-meteo:
  url: https://api.open-meteo.com

geocoding:
  url: https://geocoding-api.open-meteo.com

---
# Local environment profile
spring:
  config:
    activate:
      on-profile: local
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 13004
  datasource:
    url: jdbc:postgresql://localhost:13003/weather_service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

weather:
  cors:
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:3030}

jwt:
  # For local development - configure to point to your local authentication service
  public-key-url: ${JWT_PUBLIC_KEY_URL:http://localhost:3000/api/auth/v1/public-key}

reverse-geocode:
  api-key: ${REVERSE_GEOCODE_API_KEY}
  url: https://api-bdc.io
  language: ${REVERSE_GEOCODE_LANGUAGE:en}
