openapi: 3.0.3
info:
  title: Weather API
  version: 1.0.0
  description: Weather forecast API for retrieving weather data based on geographic coordinates.

tags:
  - name: weather
    description: Endpoints for weather forecast retrieval
  - name: locations
    description: Endpoints for saved locations

servers:
  - url: https://your-backend.com

paths:
  /forecast:
    get:
      operationId: getWeather
      summary: Get weather forecast for given coordinates
      tags:
        - weather
      parameters:
        - name: latitude
          in: query
          required: true
          description: Latitude of the location
          schema:
            type: number
            format: double
            example: 52.3676
        - name: longitude
          in: query
          required: true
          description: Longitude of the location
          schema:
            type: number
            format: double
            example: 4.9041
      responses:
        '200':
          description: Weather forecast retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherResponse'
        '400':
          description: Bad request - Invalid coordinates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - BearerAuth: [ ]
  /search:
    get:
      operationId: searchLocations
      summary: Search for locations by name
      tags:
        - locations
      parameters:
        - name: name
          in: query
          required: true
          description: Name of the location to search for
          schema:
            type: string
            example: Amsterdam
      responses:
        '200':
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
        '400':
          description: Bad request - Invalid search query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - BearerAuth: [ ]
  /saved-locations:
    get:
      operationId: getSavedLocations
      summary: Get saved locations for the authenticated user
      tags:
        - locations
      responses:
        '200':
          description: Saved locations retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - BearerAuth: [ ]
    post:
      operationId: saveLocation
      summary: Save a location for the authenticated user
      tags:
        - locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Location'
      responses:
        '200':
          description: Location saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          description: Bad request - Invalid location data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - BearerAuth: [ ]
  /saved-locations/reorder:
    put:
      operationId: reorderSavedLocations
      summary: Reorder saved locations for the authenticated user
      tags:
        - locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderRequest'
      responses:
        '204':
          description: Locations reordered successfully
        '400':
          description: Bad request - Invalid location IDs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - BearerAuth: [ ]
  /saved-locations/{id}:
    delete:
      operationId: deleteSavedLocation
      summary: Delete a saved location
      tags:
        - locations
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the saved location to delete
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Location deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Location not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - BearerAuth: [ ]

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    WeatherAlarmResponse:
      type: string
      description: Weather alarm level (comparable to European/Dutch KNMI warning system)
      enum:
        - GREEN
        - YELLOW
        - ORANGE
        - RED
    WeatherCodeResponse:
      type: string
      description: Weather condition code
      enum:
        - CLEAR_SKY
        - MAINLY_CLEAR
        - PARTLY_CLOUDY
        - OVERCAST
        - FOG
        - DEPOSITING_RIME_FOG
        - DRIZZLE_LIGHT
        - DRIZZLE_MODERATE
        - DRIZZLE_DENSE
        - FREEZING_DRIZZLE_LIGHT
        - FREEZING_DRIZZLE_DENSE
        - RAIN_SLIGHT
        - RAIN_MODERATE
        - RAIN_HEAVY
        - FREEZING_RAIN_LIGHT
        - FREEZING_RAIN_HEAVY
        - SNOW_SLIGHT
        - SNOW_MODERATE
        - SNOW_HEAVY
        - SNOW_GRAINS
        - RAIN_SHOWERS_SLIGHT
        - RAIN_SHOWERS_MODERATE
        - RAIN_SHOWERS_VIOLENT
        - SNOW_SHOWERS_SLIGHT
        - SNOW_SHOWERS_HEAVY
        - THUNDERSTORM_SLIGHT_MODERATE
        - THUNDERSTORM_SLIGHT_HAIL
        - THUNDERSTORM_HEAVY_HAIL
    WindDirectionResponse:
      type: string
      description: Wind direction
      enum:
        - N
        - NE
        - E
        - SE
        - S
        - SW
        - W
        - NW
    WeatherResponse:
      type: object
      properties:
        latitude:
          type: number
          format: double
          description: Latitude of the location
        longitude:
          type: number
          format: double
          description: Longitude of the location
        location:
          type: string
          description: Name of the location
        timezone:
          type: string
          description: Timezone of the location
        elevation:
          type: number
          format: double
          description: Elevation in meters
        current:
          $ref: '#/components/schemas/CurrentResponse'
        daily:
          type: array
          items:
            $ref: '#/components/schemas/DailyResponse'
        hourly:
          type: array
          items:
            $ref: '#/components/schemas/HourlyResponse'
        alarm:
          $ref: '#/components/schemas/WeatherAlarmResponse'
    CurrentResponse:
      type: object
      properties:
        time:
          type: string
          description: Current time
          example: "2025-11-04T14:00:00"
        weatherCode:
          $ref: '#/components/schemas/WeatherCodeResponse'
        temperature:
          type: number
          format: double
          description: Temperature in Celsius
        windSpeed:
          type: integer
          description: Wind speed in km/h
        windDirection:
          $ref: '#/components/schemas/WindDirectionResponse'
    DailyResponse:
      type: object
      properties:
        time:
          type: string
          description: Date
          example: "2025-11-04T00:00:00"
        weatherCode:
          $ref: '#/components/schemas/WeatherCodeResponse'
        temperatureMin:
          type: number
          format: double
          description: Minimum temperature in Celsius
        temperatureMax:
          type: number
          format: double
          description: Maximum temperature in Celsius
        precipitation:
          type: number
          format: double
          description: Total precipitation in mm
        precipitationProbabilityMax:
          type: integer
          description: Maximum precipitation probability percentage
        windSpeed:
          type: integer
          description: Wind speed in km/h
        windDirection:
          $ref: '#/components/schemas/WindDirectionResponse'
        sunRise:
          type: string
          description: Sunrise time
          example: "2025-11-04T06:30:00"
        sunSet:
          type: string
          description: Sunset time
          example: "2025-11-04T18:00:00"
        alarm:
          $ref: '#/components/schemas/WeatherAlarmResponse'
    HourlyResponse:
      type: object
      properties:
        time:
          type: string
          description: Hour timestamp
          example: "2025-11-04T14:00:00"
        weatherCode:
          $ref: '#/components/schemas/WeatherCodeResponse'
        temperature:
          type: number
          format: double
          description: Temperature in Celsius
        precipitation:
          type: number
          format: double
          description: Precipitation in mm
        precipitationProbability:
          type: integer
          description: Precipitation probability percentage
        windSpeed:
          type: integer
          description: Wind speed in km/h
        windDirection:
          $ref: '#/components/schemas/WindDirectionResponse'
    Location:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the location
        name:
          type: string
          description: Name of the location
        latitude:
          type: number
          format: double
          description: Latitude of the location
        longitude:
          type: number
          format: double
          description: Longitude of the location
        country:
          type: string
          description: Country name
        countryCode:
          type: string
          description: Two-letter country code
        admin1:
          type: string
          description: Administrative area level 1 (state/province)
        timezone:
          type: string
          description: Timezone of the location
    ReorderRequest:
      type: object
      required:
        - locationIds
      properties:
        locationIds:
          type: array
          items:
            type: integer
            format: int64
          description: Array of location IDs in the desired order
          example: [123, 456, 789]
    Error:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        code:
          type: string
        message:
          type: string
        traceparent:
          type: string
