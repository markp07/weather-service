version: 2
updates:
  # Maven dependencies for the parent POM and all modules
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(maven)"
      include: "scope"
    groups:
      maven-dependencies:
        patterns:
          - "*"

  # npm dependencies for the frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(npm)"
      include: "scope"
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # Docker images in docker-compose.yml
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # Docker images in authentication-service Dockerfile
  - package-ecosystem: "docker"
    directory: "/authentication-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # Docker images in weather-service Dockerfile
  - package-ecosystem: "docker"
    directory: "/weather-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # Docker images in frontend Dockerfile
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    groups:
      docker-dependencies:
        patterns:
          - "*"
